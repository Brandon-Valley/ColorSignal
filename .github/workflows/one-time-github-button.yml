name: One-time GitHub button update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Add GitHub button
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          source = path.read_text()
          repository_url = 'https://github.com/Brandon-Valley/ColorSignal'

          if repository_url in source:
              print('GitHub button already exists; nothing to change.')
              raise SystemExit(0)

          css_anchor = '.iconBtn svg{width:21px;height:21px}\n'
          css_addition = css_anchor + '.homeGithub{position:absolute;top:var(--safeTop);right:14px;z-index:4;color:var(--text);text-decoration:none;opacity:.86;transition:transform .18s ease,opacity .18s ease,background .18s ease}.homeGithub:hover{opacity:1;background:rgba(255,255,255,.14)}.homeGithub:active{transform:scale(.93)}\n'

          html_anchor = '  <section id="homeScreen" class="screen active">\n    <div class="hero">\n'
          html_addition = '''  <section id="homeScreen" class="screen active">\n    <a class="iconBtn homeGithub" href="https://github.com/Brandon-Valley/ColorSignal" target="_blank" rel="noopener noreferrer" aria-label="Open Color Signal on GitHub" title="View on GitHub">\n      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 .7a11.3 11.3 0 0 0-3.6 22c.6.1.8-.2.8-.5v-2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.4-5.5-5.7 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.3-2.8 5.3-5.5 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5A11.3 11.3 0 0 0 12 .7Z"/></svg>\n    </a>\n    <div class="hero">\n'''

          if css_anchor not in source:
              raise SystemExit('Expected CSS insertion point was not found.')
          if html_anchor not in source:
              raise SystemExit('Expected home-screen insertion point was not found.')

          source = source.replace(css_anchor, css_addition, 1)
          source = source.replace(html_anchor, html_addition, 1)
          path.write_text(source)
          PY

      - name: Commit directly to master
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html change was needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add GitHub repository button"
          git push origin master
